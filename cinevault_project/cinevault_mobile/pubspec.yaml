name: cineflash
description: "CineFlash - Votre application de suivi de films et séries"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Database - Sqflite
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  # Networking
  http: ^1.2.1

  # Auth
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.8.0

  # Utils
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  go_router: ^13.2.0
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  get_it: ^7.6.7
  injectable: ^2.4.1

  # Web & Video
  url_launcher: ^6.2.5
  youtube_player_flutter: ^9.1.3
  universal_platform: ^1.0.0+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.8.0
  freezed: ^2.4.7
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
